name: "Vinyl Guardian"
description: "Detects needle drops, IDs vinyl records, and natively scrobbles to Last.fm."
version: "2.12"
slug: "vinyl_guardian"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "application"
boot: "auto"
options:
  lastfm_username: ""
  lastfm_password: ""
  lastfm_api_key: ""
  lastfm_api_secret: ""
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mic_volume: 8
  music_threshold: 0.005
  rumble_threshold: 0.015
  recording_seconds: 15
  max_attempts: 3
  debug_logging: true
  test_capture_mode: false
schema:
  lastfm_username: "str?"
  lastfm_password: "password?"
  lastfm_api_key: "str?"
  lastfm_api_secret: "str?"
  mqtt_broker: "str"
  mqtt_port: "port"
  mqtt_user: "str?"
  mqtt_password: "password?"
  mic_volume: "int(1,100)"
  music_threshold: "float"
  rumble_threshold: "float"
  recording_seconds: "int"
  max_attempts: "int"
  debug_logging: "bool"
  test_capture_mode: "bool"
map:
  - share:rw
audio: true