name: "Vinyl Guardian"
description: "Detects needle drops and identifies vinyl records via AudioTag."
version: "1.4.5"
slug: "vinyl_guardian"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "application"
boot: "auto"
options:
  audiotag_key: ""
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  audio_threshold: 0.015
  recording_seconds: 20
  max_attempts: 3
  debug_logging: true
  debug_one_shot: false
schema:
  audiotag_key: "str"
  mqtt_broker: "str"
  mqtt_port: "port"
  mqtt_user: "str?"
  mqtt_password: "password?"
  audio_threshold: "float"
  recording_seconds: "int"
  max_attempts: "int"
  debug_logging: "bool"
  debug_one_shot: "bool"
map:
  - share:rw
audio: true