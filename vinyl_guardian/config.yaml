name: "Vinyl Guardian"
description: "Detects needle drops, IDs vinyl records, and natively scrobbles to Last.fm."
version: "3.31.6b"
slug: "vinyl_guardian"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "application"
boot: "auto"
options:
  lastfm_username: ""
  lastfm_password: ""
  lastfm_api_key: ""
  lastfm_api_secret: ""
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  test_capture_mode: false
  calibration_mode: false
  recording_seconds: 10
  debug_logging: false
  advanced:
    manual_override_mic_volume: 0
    manual_override_music_threshold: 0
    manual_override_rumble_threshold: 0
    manual_override_motor_threshold: 0
    max_attempts: 3
    min_audio_seconds: 5
    audio_onset_threshold: 1000
    trigger_debounce_chunks: 3
    needle_lift_seconds: 15
    consecutive_failure_timeout: 1800
    fallback_sleep_secs: 60
    reuse_calibration_audio: false
schema:
  lastfm_username: "str?"
  lastfm_password: "password?"
  lastfm_api_key: "str?"
  lastfm_api_secret: "str?"
  mqtt_broker: "str"
  mqtt_port: "port"
  mqtt_user: "str?"
  mqtt_password: "password?"
  test_capture_mode: "bool"
  calibration_mode: "bool"
  recording_seconds: "int"
  debug_logging: "bool"
  advanced:
    manual_override_mic_volume: "int(0,100)?"
    manual_override_music_threshold: "float?"
    manual_override_rumble_threshold: "float?"
    manual_override_motor_threshold: "float?"
    max_attempts: "int"
    min_audio_seconds: "int"
    audio_onset_threshold: "int"
    trigger_debounce_chunks: "int"
    needle_lift_seconds: "int"
    consecutive_failure_timeout: "int"
    fallback_sleep_secs: "int"
    reuse_calibration_audio: "bool"
map:
  - share:rw
audio: true