name: "Vinyl Guardian"
description: "Detects needle drops, IDs vinyl records, and natively scrobbles to Last.fm."
version: "2.16.0"
slug: "vinyl_guardian"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "application"
boot: "auto"
options:
  lastfm_username: ""
  lastfm_password: ""
  lastfm_api_key: ""
  lastfm_api_secret: ""
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mic_volume: 8
  test_capture_mode: false
  calibration_mode: false
  advanced:
    music_threshold: 0.005
    rumble_threshold: 0.015
    motor_power_threshold: 0.0045
    recording_seconds: 10
    max_attempts: 3
    min_audio_seconds: 5
    audio_onset_threshold: 1000
    trigger_debounce_chunks: 3
    needle_lift_seconds: 25
    consecutive_failure_timeout: 1800
    fallback_sleep_secs: 60
    debug_logging: true
schema:
  lastfm_username: "str?"
  lastfm_password: "password?"
  lastfm_api_key: "str?"
  lastfm_api_secret: "str?"
  mqtt_broker: "str"
  mqtt_port: "port"
  mqtt_user: "str?"
  mqtt_password: "password?"
  mic_volume: "int(1,100)"
  test_capture_mode: "bool"
  calibration_mode: "bool"
  debug_logging: "bool"
  music_threshold: "float"
  rumble_threshold: "float"
  motor_power_threshold: "float"
  recording_seconds: "int"
  max_attempts: "int"
  advanced: 
    min_audio_seconds: "int"
    audio_onset_threshold: "int"
    trigger_debounce_chunks: "int"
    needle_lift_seconds: "int"
    consecutive_failure_timeout: "int"
    fallback_sleep_secs: "int"  
map:
  - share:rw
audio: true
