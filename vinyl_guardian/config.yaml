name: "Vinyl Guardian"
description: "Listens to ADC line-in, fingerprints audio via AcoustID, and updates HA via MQTT."
version: "1.0.17"
slug: "vinyl_guardian"
init: false
arch:
  - aarch64
  - amd64
  - armv7
audio: true
devices:
  - /dev/snd:/dev/snd:rwm
startup: application
boot: auto
# This schema creates the Configuration UI boxes in Home Assistant
schema:
  acoustid_key: str
  mqtt_broker: str
  mqtt_port: int
  mqtt_user: str?
  mqtt_password: password?
  audio_threshold: float
  debug_logging: bool
# These are the default values shown to users
options:
  acoustid_key: ""
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  audio_threshold: 0.015
  debug_logging: true
